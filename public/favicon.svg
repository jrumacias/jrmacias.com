<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Row 1:  cols 5-10 -->
  <rect x="10" y="2"  width="12" height="2" fill="#111"/>
  <!-- Row 2:  cols 4-11 -->
  <rect x="8"  y="4"  width="16" height="2" fill="#111"/>
  <!-- Row 3:  cols 3-12 -->
  <rect x="6"  y="6"  width="20" height="2" fill="#111"/>
  <!-- Row 4:  cols 2-13 -->
  <rect x="4"  y="8"  width="24" height="2" fill="#111"/>
  <!-- Row 5:  cols 1-5 record | cols 6-9 label | cols 10-14 record -->
  <rect x="2"  y="10" width="10" height="2" fill="#111"/>
  <rect x="12" y="10" width="8"  height="2" fill="#222"/>
  <rect x="20" y="10" width="10" height="2" fill="#111"/>
  <!-- Row 6:  cols 1-4 record | cols 5-10 label | cols 11-14 record -->
  <rect x="2"  y="12" width="8"  height="2" fill="#111"/>
  <rect x="10" y="12" width="12" height="2" fill="#222"/>
  <rect x="22" y="12" width="8"  height="2" fill="#111"/>
  <!-- Row 7:  cols 1-4 record | cols 5-6 label | cols 7-8 hole | cols 9-10 label | cols 11-14 record -->
  <rect x="2"  y="14" width="8"  height="2" fill="#111"/>
  <rect x="10" y="14" width="4"  height="2" fill="#222"/>
  <rect x="14" y="14" width="4"  height="2" fill="#d0d0d0"/>
  <rect x="18" y="14" width="4"  height="2" fill="#222"/>
  <rect x="22" y="14" width="8"  height="2" fill="#111"/>
  <!-- Row 8:  same as row 7 -->
  <rect x="2"  y="16" width="8"  height="2" fill="#111"/>
  <rect x="10" y="16" width="4"  height="2" fill="#222"/>
  <rect x="14" y="16" width="4"  height="2" fill="#d0d0d0"/>
  <rect x="18" y="16" width="4"  height="2" fill="#222"/>
  <rect x="22" y="16" width="8"  height="2" fill="#111"/>
  <!-- Row 9:  same as row 6 -->
  <rect x="2"  y="18" width="8"  height="2" fill="#111"/>
  <rect x="10" y="18" width="12" height="2" fill="#222"/>
  <rect x="22" y="18" width="8"  height="2" fill="#111"/>
  <!-- Row 10: same as row 5 -->
  <rect x="2"  y="20" width="10" height="2" fill="#111"/>
  <rect x="12" y="20" width="8"  height="2" fill="#222"/>
  <rect x="20" y="20" width="10" height="2" fill="#111"/>
  <!-- Row 11: cols 2-13 -->
  <rect x="4"  y="22" width="24" height="2" fill="#111"/>
  <!-- Row 12: cols 3-12 -->
  <rect x="6"  y="24" width="20" height="2" fill="#111"/>
  <!-- Row 13: cols 4-11 -->
  <rect x="8"  y="26" width="16" height="2" fill="#111"/>
  <!-- Row 14: cols 5-10 -->
  <rect x="10" y="28" width="12" height="2" fill="#111"/>
</svg>
